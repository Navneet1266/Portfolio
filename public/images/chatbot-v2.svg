<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 800" width="1400" height="800" role="img" aria-label="Clean chat UI mockup">
  <defs>
    <linearGradient id="g1" x1="0" x2="1">
      <stop offset="0" stop-color="#06b6d4"/>
      <stop offset="1" stop-color="#3b82f6"/>
    </linearGradient>
    <filter id="s" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="20" flood-color="#00000022"/>
    </filter>
  </defs>

  <rect width="100%" height="100%" fill="#0f172a"/>

  <!-- centered device card -->
  <g transform="translate(100,80)">
    <rect width="1200" height="640" rx="18" fill="url(#g1)" opacity="0.95"/>
    <rect x="20" y="20" width="1160" height="600" rx="14" fill="#ffffff"/>

    <!-- header -->
    <g transform="translate(40,40)">
      <text x="0" y="0" font-family="Inter, Arial, sans-serif" font-size="20" fill="#0b1220" font-weight="700">LLM Q&A Chatbot</text>
      <rect x="0" y="18" width="1100" height="1" fill="#e6eef5"/>
    </g>

    <!-- messages column -->
    <g transform="translate(40,92)">
      <!-- bot message -->
      <g>
        <rect x="0" y="0" width="720" height="54" rx="12" fill="#eef2ff"/>
        <text x="18" y="36" font-family="Inter, Arial, sans-serif" font-size="14" fill="#0b1220">Hi — I can search your documents. Ask something like: "Top products in Q1"</text>
      </g>

      <!-- user message -->
      <g transform="translate(0,84)">
        <rect x="440" y="0" width="400" height="46" rx="12" fill="#0b1220"/>
        <text x="640" y="32" font-family="Inter, Arial, sans-serif" font-size="14" fill="#fff" text-anchor="middle">Show top products</text>
      </g>

      <!-- bot reply card -->
      <g transform="translate(0,156)">
        <rect x="0" y="0" width="720" height="110" rx="12" fill="#f0f9ff"/>
        <text x="18" y="28" font-family="Inter, Arial, sans-serif" font-size="14" fill="#0b1220">Found matches in sales_report_q1.xlsx</text>
        <!-- small table representation -->
        <g transform="translate(18,36)">
          <rect x="0" y="0" width="220" height="58" rx="6" fill="#fff" stroke="#e6eef5"/>
          <text x="12" y="20" font-family="Inter, Arial, sans-serif" font-size="12" fill="#334155">Product</text>
          <text x="140" y="20" font-family="Inter, Arial, sans-serif" font-size="12" fill="#334155">Sales</text>
          <text x="12" y="40" font-family="Inter, Arial, sans-serif" font-size="12" fill="#0b1220">Alpha</text>
          <text x="140" y="40" font-family="Inter, Arial, sans-serif" font-size="12" fill="#0b1220">$54,321</text>
        </g>
      </g>

      <!-- input field -->
      <g transform="translate(0,288)">
        <rect x="0" y="0" width="720" height="56" rx="12" fill="#f1f5f9"/>
        <text x="18" y="36" font-family="Inter, Arial, sans-serif" font-size="14" fill="#475569">Type a question or paste a document...</text>
      </g>
    </g>

    <!-- right sidebar with icons -->
    <g transform="translate(800,92)">
      <rect x="0" y="0" width="320" height="496" rx="12" fill="#0b1220"/>
      <g transform="translate(18,18)" fill="#cbd5e1" font-family="Inter, Arial, sans-serif">
        <text x="0" y="0" font-size="16" font-weight="700">Documents</text>
        <g transform="translate(0,20)">
          <rect x="0" y="20" width="280" height="42" rx="8" fill="#071328"/>
          <text x="12" y="48" font-size="13">sales_report_q1.xlsx</text>
          <rect x="0" y="76" width="280" height="42" rx="8" fill="#071328"/>
          <text x="12" y="104" font-size="13">financials.pdf</text>
        </g>
      </g>
    </g>
  </g>
</svg>

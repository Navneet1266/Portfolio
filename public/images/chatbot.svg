<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="800" viewBox="0 0 1400 800" role="img" aria-label="Rich chat UI mockup">
  <defs>
    <linearGradient id="bg" x1="0" x2="1">
      <stop offset="0" stop-color="#ffedd5"/>
      <stop offset="1" stop-color="#fde68a"/>
    </linearGradient>
    <linearGradient id="panelGrad" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#f8fafc"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="12" stdDeviation="24" flood-color="#00000022"/>
    </filter>
  </defs>

  <rect width="100%" height="100%" fill="url(#bg)"/>

  <!-- device/frame -->
  <g transform="translate(80,60)">
    <rect width="1240" height="680" rx="22" fill="#0f172a" opacity="0.92" filter="url(#shadow)"/>

    <!-- inner chat window -->
    <g transform="translate(28,28)">
      <rect width="1184" height="624" rx="16" fill="url(#panelGrad)"/>

      <!-- left: messages area -->
      <g transform="translate(24,24)">
        <rect width="760" height="576" rx="12" fill="#f1f5f9"/>

        <!-- header -->
        <g>
          <text x="18" y="28" font-family="Inter, Arial, sans-serif" font-size="18" fill="#0f172a" font-weight="700">LLM Q&A Chatbot</text>
          <text x="18" y="46" font-family="Inter, Arial, sans-serif" font-size="12" fill="#475569">Ask questions about your documents and get precise answers</text>
        </g>

        <!-- bot bubble -->
        <g transform="translate(0,72)">
          <rect x="0" y="0" width="620" height="64" rx="14" fill="#dbeafe"/>
          <text x="18" y="40" font-family="Inter, Arial, sans-serif" font-size="14" fill="#0b1220">Hi — I can search your files. Try: "How many sales in Q1?"</text>
        </g>

        <!-- user bubble (right) -->
        <g transform="translate(140,156)">
          <rect x="0" y="0" width="480" height="52" rx="14" fill="#0b1220"/>
          <text x="240" y="34" font-family="Inter, Arial, sans-serif" font-size="14" fill="#ffffff" text-anchor="middle">Show sales for Q1</text>
        </g>

        <!-- response card with mini chart -->
        <g transform="translate(0,236)">
          <rect x="0" y="0" width="720" height="120" rx="12" fill="#e8f7ff"/>
          <text x="18" y="28" font-family="Inter, Arial, sans-serif" font-size="14" fill="#0b1220">Found 1 document. Q1 sales: $123,456</text>
          <g transform="translate(18,40)">
            <!-- mini bar chart -->
            <rect x="0" y="32" width="36" height="40" rx="4" fill="#60a5fa"/>
            <rect x="48" y="10" width="36" height="62" rx="4" fill="#3b82f6"/>
            <rect x="96" y="22" width="36" height="50" rx="4" fill="#2563eb"/>
            <rect x="144" y="2" width="36" height="70" rx="4" fill="#1e40af"/>
            <rect x="192" y="18" width="120" height="42" rx="6" fill="#ffffff" opacity="0.6"/>
          </g>
        </g>

        <!-- input area -->
        <g transform="translate(0,380)">
          <rect x="0" y="0" width="720" height="60" rx="12" fill="#eef2ff"/>
          <text x="18" y="38" font-family="Inter, Arial, sans-serif" font-size="14" fill="#334155">Type a question or paste a document...</text>
          <rect x="636" y="10" width="68" height="40" rx="10" fill="#2563eb"/>
          <text x="670" y="36" font-family="Inter, Arial, sans-serif" font-size="14" fill="#fff" text-anchor="middle">Send</text>
        </g>
      </g>

      <!-- right: sidebar (documents & actions) -->
      <g transform="translate(820,24)">
        <rect width="340" height="576" rx="12" fill="#0b1220"/>
        <g transform="translate(20,20)" font-family="Inter, Arial, sans-serif">
          <text x="0" y="22" font-size="16" fill="#fff" font-weight="700">Documents</text>
          <g transform="translate(0,36)" fill="#cbd5e1">
            <rect x="0" y="0" width="300" height="44" rx="8" fill="#071328"/>
            <text x="16" y="28" font-size="13" fill="#cbd5e1">sales_report_q1.xlsx</text>
            <rect x="0" y="64" width="300" height="44" rx="8" fill="#071328"/>
            <text x="16" y="92" font-size="13" fill="#cbd5e1">financials.pdf</text>
            <rect x="0" y="128" width="300" height="44" rx="8" fill="#071328"/>
            <text x="16" y="156" font-size="13" fill="#cbd5e1">notes.csv</text>
          </g>
        </g>
      </g>

    </g>
  </g>

</svg>
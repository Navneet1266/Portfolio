<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 800" width="1400" height="800" role="img" aria-label="Attractive chat UI mockup">
  <defs>
    <linearGradient id="bg" x1="0" x2="1">
      <stop offset="0" stop-color="#0ea5a5"/>
      <stop offset="1" stop-color="#6366f1"/>
    </linearGradient>
    <linearGradient id="card" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#f8fafc"/>
    </linearGradient>
  </defs>

  <rect width="100%" height="100%" fill="url(#bg)"/>

  <!-- centered device card -->
  <g transform="translate(100,70)">
    <rect width="1200" height="660" rx="24" fill="url(#card)" stroke="#ffffff22" stroke-width="1" />

    <!-- header -->
    <g transform="translate(48,36)">
  <circle cx="12" cy="12" r="10" fill="#6366f1"/>
  <text x="32" y="16" font-family="Inter, Arial, sans-serif" font-size="18" fill="#0b1220" font-weight="700">LLM Q&amp;A Chatbot</text>
    </g>

    <!-- main area -->
    <g transform="translate(48,84)">
      <!-- messages panel -->
      <rect x="0" y="0" width="760" height="540" rx="12" fill="#ffffff" stroke="#e6eef5"/>

      <!-- bot bubble with avatar -->
      <g transform="translate(16,18)">
        <circle cx="18" cy="26" r="16" fill="#06b6d4"/>
        <rect x="52" y="8" width="640" height="56" rx="12" fill="#eef2ff"/>
        <text x="72" y="40" font-family="Inter, Arial, sans-serif" font-size="14" fill="#0b1220">Hi — I can search your documents. Try: "Top products in Q1"</text>
      </g>

      <!-- user bubble aligned right -->
      <g transform="translate(0,96)">
        <rect x="360" y="0" width="372" height="48" rx="12" fill="#0b1220"/>
        <text x="546" y="32" font-family="Inter, Arial, sans-serif" font-size="14" fill="#ffffff" text-anchor="middle">Show top products</text>
      </g>

      <!-- response card with small table -->
      <g transform="translate(16,170)">
        <rect x="0" y="0" width="720" height="112" rx="12" fill="#f0f9ff"/>
        <text x="18" y="28" font-family="Inter, Arial, sans-serif" font-size="14" fill="#0b1220">Found matches in sales_report_q1.xlsx</text>
        <g transform="translate(18,40)">
          <rect x="0" y="0" width="240" height="58" rx="8" fill="#fff" stroke="#e6eef5"/>
          <text x="12" y="20" font-family="Inter, Arial, sans-serif" font-size="12" fill="#334155">Product</text>
          <text x="160" y="20" font-family="Inter, Arial, sans-serif" font-size="12" fill="#334155">Sales</text>
          <text x="12" y="40" font-family="Inter, Arial, sans-serif" font-size="12" fill="#0b1220">Alpha</text>
          <text x="160" y="40" font-family="Inter, Arial, sans-serif" font-size="12" fill="#0b1220">$54,321</text>
        </g>
      </g>

      <!-- input area -->
      <g transform="translate(16,300)">
        <rect x="0" y="0" width="720" height="56" rx="12" fill="#f1f5f9"/>
        <text x="16" y="36" font-family="Inter, Arial, sans-serif" font-size="14" fill="#475569">Type a question or paste a document...</text>
        <rect x="644" y="8" width="64" height="40" rx="10" fill="#06b6d4"/>
        <text x="676" y="34" font-family="Inter, Arial, sans-serif" font-size="12" fill="#fff" text-anchor="middle">Send</text>
      </g>
    </g>

    <!-- right sidebar (docs) -->
    <g transform="translate(840,84)">
      <rect x="0" y="0" width="312" height="540" rx="12" fill="#0b1220"/>
      <text x="18" y="28" font-family="Inter, Arial, sans-serif" font-size="14" fill="#fff" font-weight="700">Documents</text>
      <g transform="translate(18,52)" fill="#cbd5e1" font-family="Inter, Arial, sans-serif" font-size="13">
        <rect x="0" y="12" width="276" height="44" rx="8" fill="#071328"/>
        <text x="12" y="40">sales_report_q1.xlsx</text>
        <rect x="0" y="72" width="276" height="44" rx="8" fill="#071328"/>
        <text x="12" y="100">financials.pdf</text>
      </g>
    </g>
  </g>
</svg>